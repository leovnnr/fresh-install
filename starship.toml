# ==============================================================================
# ~/.config/starship.toml — Starship prompt
# Base : preset Tokyo Night + tweaks personnalisés
# Copié automatiquement par install.sh
# ==============================================================================

# Généré via : starship preset tokyo-night -o ~/.config/starship.toml
# puis enrichi manuellement

"$schema" = 'https://starship.rs/config-schema.json'

palette = "tokyo-night"

command_timeout = 1000

[palettes.tokyo-night]
dark_blue = '#15161e'
blue = '#7aa2f7'
cyan = '#7dcfff'
red = '#f7768e'
orange = '#ff9e64'
yellow = '#e0af68'
green = '#9ece6a'
teal = '#73daca'
magenta = '#bb9af7'
purple = '#9d7cd8'
white = '#c0caf5'
dark_white = '#a9b1d6'
gray = '#565f89'
dark_gray = '#414868'
black = '#24283b'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
style = "bold purple"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "yellow bold"

[python]
symbol = " "
style = "bold green"

[nodejs]
symbol = " "
style = "bold green"

[docker_context]
symbol = " "
style = "bold blue"

# Affiche le contexte SSH — utile pour tes connexions ubuntu
[username]
show_always = false
style_user = "bold teal"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "bold orange"
format = "[@$hostname]($style) "

# Heure — utile en sessions SSH
[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "gray"

[battery]
disabled = false

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"
